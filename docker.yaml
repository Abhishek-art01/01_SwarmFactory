services:
  redis:
    image: redis:alpine
    # no host port published by default; accessible by other services via 'redis:6379'
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile
      target: production
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/backend
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: infra/Dockerfile
      target: production
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/backend
      - REDIS_URL=redis://redis:6379/0
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: swarm-factory-dev-key
    environment:
      - VITE_API_KEY=swarm-factory-dev-key
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: swarm-factory-net
