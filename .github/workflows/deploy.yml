name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: swarm-factory-api
  RESOURCE_GROUP: swarm-factory-rg
  ACR_NAME: swarmfactoryacr

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install & test
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pytest tests/ -v --ignore=tests/integration || echo "No tests found, skipping"
        env:
          AZURE_OPENAI_ENDPOINT: "https://stub.openai.azure.com/"
          AZURE_OPENAI_API_KEY: "stub-key"
          AZURE_OPENAI_DEPLOYMENT_GPT4O: "gpt-4o"
          AZURE_OPENAI_DEPLOYMENT_PHI4: "phi-4"
          AZURE_OPENAI_DEPLOYMENT_MINI: "gpt-4o-mini"
          AZURE_OPENAI_API_VERSION: "2024-02-01"
          GITHUB_TOKEN: "stub-token"
          GITHUB_ORG: "stub-org"
          AZURE_SUBSCRIPTION_ID: "00000000-0000-0000-0000-000000000000"
          AZURE_RESOURCE_GROUP: "stub-rg"
          AZURE_CONTAINER_REGISTRY: "stub.azurecr.io"
          AZURE_CONTAINER_APP_ENV: "stub-env"
          REDIS_URL: "redis://localhost:6379/0"
          API_KEY: "stub-api-key"
          SECRET_KEY: "stub-secret-key-32-chars-minimum-xx"

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI login
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "✅ Azure login successful"

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image URI
        id: image
        run: |
          URI="${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }}"
          echo "uri=$URI" >> "$GITHUB_OUTPUT"
          echo "Image: $URI"

      - name: Build and push Docker image
        run: |
          docker build \
            --file infra/Dockerfile \
            --tag "${{ steps.image.outputs.uri }}" \
            --tag "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:latest" \
            .
          docker push "${{ steps.image.outputs.uri }}"
          docker push "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:latest"

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI login
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "✅ Azure login successful"

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ needs.build.outputs.image_uri }}" \
            --set-env-vars \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AZURE_OPENAI_API_VERSION=2024-02-01" \
              "AZURE_OPENAI_DEPLOYMENT=gpt-4o" \
              "AZURE_OPENAI_DEPLOYMENT_GPT4O=gpt-4o" \
              "AZURE_OPENAI_DEPLOYMENT_PHI4=phi-4" \
              "AZURE_OPENAI_DEPLOYMENT_MINI=gpt-4o-mini" \
              "AZURE_SEARCH_ENDPOINT=${{ secrets.AZURE_SEARCH_ENDPOINT }}" \
              "AZURE_SEARCH_API_KEY=${{ secrets.AZURE_SEARCH_API_KEY }}" \
              "AZURE_SEARCH_INDEX_NAME=swarm-memory" \
              "REDIS_URL=${{ secrets.REDIS_URL }}" \
              "API_KEY=${{ secrets.API_KEY }}" \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "APP_ENV=production" \
              "LOG_LEVEL=INFO" \
              "MAX_CONCURRENT_JOBS=5" \
              "JOB_TIMEOUT_SECONDS=600" \
              "SESSION_STORE_PATH=./sessions" \
              "GITHUB_TOKEN=${{ secrets.GH_TOKEN }}" \
              "GITHUB_ORG=${{ secrets.GH_ORG }}"

      - name: Wait and smoke test
        run: |
          echo "Waiting 60s..."
          sleep 60
          FQDN=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          curl --fail --max-time 30 --retry 5 --retry-delay 10 "https://${FQDN}/health"
          echo "✅ Smoke test passed"

      - name: Print URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "🚀 Deployed: https://${FQDN}"
