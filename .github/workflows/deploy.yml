name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: Force redeploy even if no code changed
        required: false
        default: "false"

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: swarm-factory-api
  RESOURCE_GROUP: swarm-factory-rg
  ACR_NAME: swarmfactoryacr
  CONTAINER_APP_ENV: swarm-factory-env
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── 1. Run tests first ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install & test
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pytest tests/ -v
        env:
          AZURE_OPENAI_ENDPOINT: "https://stub.openai.azure.com/"
          AZURE_OPENAI_API_KEY: "stub-key"
          AZURE_OPENAI_DEPLOYMENT_GPT4O: "gpt-4o"
          AZURE_OPENAI_DEPLOYMENT_PHI4: "phi-4"
          AZURE_OPENAI_DEPLOYMENT_MINI: "gpt-4o-mini"
          AZURE_OPENAI_API_VERSION: "2024-02-01"
          GITHUB_TOKEN: "stub-token"
          GITHUB_ORG: "stub-org"
          AZURE_SUBSCRIPTION_ID: "00000000-0000-0000-0000-000000000000"
          AZURE_RESOURCE_GROUP: stub-rg
          AZURE_CONTAINER_REGISTRY: stub.azurecr.io
          AZURE_CONTAINER_APP_ENV: stub-env

  # ── 2. Build & push image ─────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image URI output
        id: image
        run: |
          URI="${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          echo "uri=$URI" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            --file infra/Dockerfile \
            --tag "${{ steps.image.outputs.uri }}" \
            --tag "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:latest" \
            .

          docker push "${{ steps.image.outputs.uri }}"
          docker push "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:latest"

  # ── 3. Deploy to Azure Container Apps ─────────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ needs.build.outputs.image_uri }}" \
            --set-env-vars \
              AZURE_OPENAI_ENDPOINT=secretref:azure-openai-endpoint \
              AZURE_OPENAI_API_KEY=secretref:azure-openai-key

      - name: Wait for rollout
        run: |
          echo "Waiting for Container App to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(az containerapp show \
              --name "${{ env.APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "properties.latestRevisionFqdn" -o tsv 2>/dev/null || echo "")
            if [ -n "$STATUS" ]; then
              echo "App FQDN: $STATUS"
              break
            fi
            echo "Attempt $i/12: still waiting..."
            sleep 15
          done

      - name: Smoke test
        run: |
          FQDN=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.latestRevisionFqdn" -o tsv)
          echo "Smoke testing https://$FQDN/health"
          curl --fail --max-time 30 --retry 5 --retry-delay 10 \
               "https://$FQDN/health"
          echo "Smoke test passed ✓"

      - name: Print deployment URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.latestRevisionFqdn" -o tsv)
          echo "🚀 Deployed to: https://$FQDN"
