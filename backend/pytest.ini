[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:celery.*
