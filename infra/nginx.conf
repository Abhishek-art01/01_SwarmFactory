# =============================================================
# Swarm Factory — Nginx Reverse Proxy Configuration
# =============================================================
# Handles:
#   - Static frontend (React build)
#   - API proxy → FastAPI (http://api:8000)
#   - WebSocket proxy → FastAPI (ws://api:8000)
#   - GZIP compression
#   - Security headers
# =============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── GZIP compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upstream: FastAPI backend ─────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Health check (used by Docker / Azure load balancer) ───────────────
        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── WebSocket: /ws/* → FastAPI ────────────────────────────────────────
        # WebSocket connections need special upgrade headers.
        # The client opens ws://host/ws/{job_id} and this block
        # proxies it to the FastAPI WebSocket handler.
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # These two headers are REQUIRED for WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Keep WebSocket connections alive for up to 10 minutes
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 10s;
        }

        # ── API: /api/* → FastAPI ─────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout for long-running swarm jobs (up to 10 min)
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 10s;

            # Disable buffering for streaming responses
            proxy_buffering off;
            proxy_cache off;
        }

        # ── Frontend: React static build ──────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;

            # SPA routing: serve index.html for all unknown routes
            # so React Router can handle /dashboard/:jobId etc.
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively (Vite adds content hashes to filenames)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # Never cache index.html (so new deploys are picked up immediately)
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
